body:
  text: 新譯大乘入楞伽經序御製蓋聞摩羅山頂既最崇而最嚴楞伽城中實難往而難入先佛弘宣之地曩聖修行之所爰有城主號羅婆那乘宮殿以謁尊顏奏樂音而祈妙法因鬘峯以表興指藏海以明宗所言入楞伽經者斯乃諸佛心量之玄樞群經理窟之妙鍵廣喻幽旨洞明深義不生不滅非有非無絕去來之二途離斷常之雙執以第一義諦得最上妙珍體諸法之皆虛知前境之如幻混假名之分別等生死與涅槃大慧之問初陳法王之旨斯發一百八義應實相而離世間三十九門破邪見而宣政法曉名相之並假祛妄想之迷衿依正智以會真如悟緣起而歸妙理境風既息識浪方澄三自性皆空二無我俱泯入如來之藏遊解脫之門原此經文來自西國至若元嘉建號跋陀之譯未弘延昌紀年流支之義多舛朕虔思付囑情切紹隆以久視元年歲次庚子林鍾紀律炎帝司辰于時避暑箕峯觀風頴水三陽宮內重出斯經討三本之要詮成七卷之了教三藏沙門于闐國僧實叉難陀大德大福先寺僧復禮等並名追安遠德契騰蘭襲龍樹之芳猷探馬鳴之秘府戒香與覺花齊馥意珠共性月同圓故能了達沖微發揮奧賾以長安四年正月十五日繕寫云畢自惟菲薄言謝珪璋顧四辯而多慚瞻一乘而罔測難違緇俗之請強申翰墨之文詞拙理乖彌增愧恧伏以此經微妙最為希有所冀破重昏之暗傳燈之句不窮演流注之功湧泉之義無盡題目品次列於後云
